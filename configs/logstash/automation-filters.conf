input {
  beats {
    port => 5044
  }
}

filter {
  mutate {
    add_field => {
      "[observer][type]" => "siemx"
    }
  }

  grok {
    match => {
      "message" => [
        "%{SYSLOGTIMESTAMP:syslog_timestamp} %{HOSTNAME:syslog_host} sshd(?:\\[%{POSINT:pid}\\])?: Failed password for (?:invalid user )?%{DATA:username} from %{IP:source_ip} port %{POSINT:source_port} ssh2",
        "%{SYSLOGTIMESTAMP:syslog_timestamp} %{HOSTNAME:syslog_host} sshd(?:\\[%{POSINT:pid}\\])?: Accepted password for %{DATA:username} from %{IP:source_ip} port %{POSINT:source_port} ssh2",
        "%{SYSLOGTIMESTAMP:syslog_timestamp} %{HOSTNAME:syslog_host} %{GREEDYDATA:raw_message}"
      ]
    }
    tag_on_failure => [ "_grokparsefailure", "malformed_log" ]
  }

  date {
    match => [ "syslog_timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss", "ISO8601" ]
    target => "@timestamp"
  }

  mutate {
    rename => {
      "syslog_host" => "[host][name]"
    }
  }

  if "Failed password" in [message] {
    mutate {
      add_field => {
        "[event][category]" => "authentication"
        "[event][type]" => "login_failure"
        "[event][outcome]" => "failure"
      }
      add_tag => [ "failed_login", "security_event" ]
    }
  } else if "Accepted password" in [message] {
    mutate {
      add_field => {
        "[event][category]" => "authentication"
        "[event][type]" => "login_success"
        "[event][outcome]" => "success"
      }
      add_tag => [ "successful_login", "security_event" ]
    }
  } else if "port scan" in [message] {
    mutate {
      add_field => {
        "[event][category]" => "network"
        "[event][type]" => "connection_attempt"
        "[event][outcome]" => "attempt"
      }
      add_tag => [ "port_scan_candidate", "security_event" ]
    }
  }

  if [source_ip] {
    mutate {
      add_field => {
        "[source][ip]" => "%{source_ip}"
      }
    }
  }

  if [source_port] {
    mutate {
      add_field => {
        "[source][port]" => "%{source_port}"
      }
    }
  }

  if [username] {
    mutate {
      add_field => {
        "[user][name]" => "%{username}"
      }
    }
  }

  if "_grokparsefailure" in [tags] {
    mutate {
      add_tag => [ "parse_error" ]
    }
  }
}

output {
  elasticsearch {
    hosts => [ "http://elasticsearch:9200" ]
    user => "elastic"
    password => "SiemxPass123!"
    index => "siem-logs-%{+YYYY.MM.dd}"
  }
  stdout {
    codec => rubydebug
  }
}
