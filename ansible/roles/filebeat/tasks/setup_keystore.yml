---
# Set up Filebeat keystore

- name: Create Filebeat keystore
  shell: |
    filebeat keystore create
  args:
    chdir: /usr/share/filebeat
    creates: "{{ filebeat_keystore_path }}"
  become: yes
  when: ansible_os_family != "Windows"

- name: Add Logstash password to keystore
  shell: |
    echo "{{ elasticsearch_password }}" | filebeat keystore add -x LOGSTASH_PASSWORD
  args:
    chdir: /usr/share/filebeat
  become: yes
  when: 
    - elasticsearch_password != 'changeme'
    - ansible_os_family != "Windows"

- name: Add SSL key passphrase to keystore (if applicable)
  shell: |
    echo "{{ ssl_key_passphrase | default('') }}" | filebeat keystore add -x SSL_KEY_PASSPHRASE
  args:
    chdir: /usr/share/filebeat
  become: yes
  when: 
    - ssl_key_passphrase is defined and ssl_key_passphrase != ''
    - ansible_os_family != "Windows"

- name: Set proper permissions on keystore
  file:
    path: "{{ filebeat_keystore_path }}"
    mode: '0600'
    owner: root
    group: root
  when: ansible_os_family != "Windows"